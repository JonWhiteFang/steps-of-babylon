# Plan 32 / ADR-0018 — core PR gate. Secret-free: a debug build needs no signing
# keystore and AdMob falls back to Google test IDs (see app/build.gradle.kts).
# Actions are SHA-pinned (decision #5); Dependabot maintains the pins.
#
# Docs/tooling-only fast path: the `changes` job classifies the diff; `build-and-test` ALWAYS runs
# (so the required status check always reports), but its heavy steps are gated on
# `needs.changes.outputs.code == 'true'`. A docs/tooling-only change (only `docs/**` / `*.md` /
# `.claude/**` / `.mcp.json`) skips the build/lint/test entirely and the check goes green in seconds
# — no PR/CI overhead for checkpoint doc syncs or Claude Code agent/skill/hook/MCP edits (none of
# which affects the built app). Anything else (app code, `.github/`, `app/schemas/`, gradle/config,
# `site/` non-md) is treated as code and runs the full gate. Fail-safe: when the diff base is unknown
# the verdict defaults to code (full gate). Keep the classifier in sync with instrumented.yml.
name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast classifier: outputs code=true unless EVERY changed path is docs/tooling
  # (`docs/**`, `*.md`, `.claude/**`, or the root `.mcp.json`).
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            base="$BASE_SHA"; head="$HEAD_SHA"
          elif [ "$EVENT" = "push" ] && [ -n "${BEFORE:-}" ] \
               && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
            base="$BEFORE"; head="$AFTER"
          else
            # Unknown base (schedule / manual / first push) → run the full gate, never silently skip.
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Event=$EVENT with no usable diff base → full gate."
            exit 0
          fi
          files="$(git diff --name-only "$base" "$head")"
          echo "Changed files:"; echo "$files"
          # Non-code = anything NOT docs/tooling. Docs/tooling = under docs/, a .md file, under
          # .claude/ (agents/skills/hooks/settings — never built or shipped), or the root .mcp.json.
          # Conservative: anything not matched (incl. .github/, app/schemas/, gradle, site/ non-md)
          # is code → full gate.
          non_docs="$(printf '%s\n' "$files" | grep -vE '^$' | grep -vE '^docs/|\.md$|^\.claude/|^\.mcp\.json$' || true)"
          if [ -z "$non_docs" ]; then
            echo "code=false" >> "$GITHUB_OUTPUT"
            echo "Verdict: docs/tooling-only → skipping the heavy build/lint/test steps."
          else
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Verdict: code change → full gate (first non-docs path: $(printf '%s' "$non_docs" | head -1))."
          fi

  build-and-test:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.code == 'true'
      # #212 (CICD-1): validate the checked-in gradle-wrapper.jar against known-good Gradle release
      # checksums before any Gradle invocation. Pairs with distributionSha256Sum in
      # gradle-wrapper.properties (which verifies the downloaded distribution).
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5.3.0
        if: needs.changes.outputs.code == 'true'
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        if: needs.changes.outputs.code == 'true'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        if: needs.changes.outputs.code == 'true'

      # The documented one-call gate (docs/archive/smoke_tests/.../README.md): lint + unit + debug build.
      # #262 L71: lintRelease added so the RELEASE variant's lint (release manifest/resource config +
      # release-only lint, which lintDebug skips) is gated on every PR. lintRelease is a lint task — it does
      # NOT match the play.licenseKey release-artifact guard regex and needs no signing secrets (it does not
      # assemble/sign). It analyzes the release variant's sources/manifest/resources, not the post-R8 output.
      - name: Lint (debug + release), unit tests, debug build
        if: needs.changes.outputs.code == 'true'
        run: ./gradlew testDebugUnitTest lintDebug lintRelease assembleDebug --stacktrace

      # #370 (cicd-1): build the MINIFIED release variant so an R8/shrink keep-rule regression fails
      # HERE, on every code PR, instead of reaching Play internal when a v* tag auto-publishes.
      # The play.licenseKey guard (app/build.gradle.kts whenReady) hard-fails a blank key on any
      # *Release assemble/bundle, so inject a THROWAWAY non-publishing placeholder into local.properties
      # FIRST (separate step — local.properties is read at Gradle configuration time). This is NOT a
      # real key: assembleRelease produces an UNSIGNED APK (release signingConfig is applied only
      # `if (keystorePropertiesFile.exists())`, which is false in the secret-free PR gate), so no
      # signing/publishing can occur. The real release.yml publish lane still injects the real key
      # and keeps the guard fail-closed.
      - name: Seed non-publishing release license key
        if: needs.changes.outputs.code == 'true'
        run: echo 'play.licenseKey=ci-nonpublishing-placeholder' >> local.properties

      - name: Assemble release variant (R8/shrink guard; unsigned, non-publishing)
        if: needs.changes.outputs.code == 'true'
        run: ./gradlew assembleRelease --stacktrace

      # #218: informational coverage of the JVM unit suite. NON-GATING — no threshold; the report is
      # uploaded as an artifact so future work can see which surfaces (Compose/service/worker) are
      # uncovered. :app:-prefixed to stay scoped to the shipping module (the com.android.test benchmark
      # modules carry no product code + don't apply Kover). Reuses the just-run test results. This runs
      # BEFORE the #373 verify step (below) as its OWN step so report.xml/html are written even if the
      # gate then fails — the `if: always()` artifact upload always captures the whole-app report.
      - name: Kover coverage report (informational, whole-app)
        if: needs.changes.outputs.code == 'true'
        run: ./gradlew :app:koverXmlReport :app:koverHtmlReport --stacktrace

      # #373 (testing-1): GATING coverage ratchet — scoped to the fragile concurrency/economy zones only
      # (see the kover{} block in app/build.gradle.kts). koverVerifyDebug uses the FILTERED debug-variant
      # report set (blended floor 85 + per-package floor 54); the aggregate koverVerify/koverXmlReport
      # stay unfiltered/whole-app (so #218 above is unaffected). A refactor that silently guts assertions
      # on these zones drops coverage below a floor and fails HERE, on every code PR. Separate step so the
      # report above is already written when this runs.
      - name: Kover verify (fragile-zone coverage ratchet, #373)
        if: needs.changes.outputs.code == 'true'
        run: ./gradlew :app:koverVerifyDebug --stacktrace

      - name: Compile benchmark modules (type-check only; benchmarks run locally, never CI-gated)
        if: needs.changes.outputs.code == 'true'
        run: ./gradlew :baselineprofile:assemble :macrobenchmark:assemble --stacktrace

      # KSP re-exports the Room schema during assembleDebug; fail if it drifts from the
      # committed app/schemas (a migration added without committing the regenerated schema).
      # #254: `git diff` alone misses a NEW, untracked schema (e.g. KSP regenerates 13.json but the
      # dev forgot to `git add` it) — the most likely real drift. `git add -N` stages new files as
      # intent-to-add so `git diff` then sees both modified AND new files; `--porcelain` is a final
      # belt-and-braces check that nothing untracked remains.
      - name: Room schema-drift guard
        if: needs.changes.outputs.code == 'true'
        run: |
          git add -N app/schemas
          git diff --exit-code app/schemas || { echo "::error::Room schema drift — commit the app/schemas changes (new or modified)"; exit 1; }
          if [ -n "$(git status --porcelain app/schemas)" ]; then
            echo "::error::Untracked Room schema files under app/schemas — commit the regenerated schema JSON"
            git status --porcelain app/schemas
            exit 1
          fi

      - name: detekt (code-smell / complexity gate)
        if: needs.changes.outputs.code == 'true'
        run: ./gradlew :app:detekt --stacktrace

      - name: Upload reports
        if: always() && needs.changes.outputs.code == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ci-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
            **/build/outputs/apk/debug/*.apk
          if-no-files-found: ignore
          retention-days: 7

      - name: Docs-only — heavy gate skipped
        if: needs.changes.outputs.code != 'true'
        run: echo "Docs-only change — build/lint/test skipped; required check satisfied."

      - name: Clean up seeded license key
        if: always() && needs.changes.outputs.code == 'true'
        run: rm -f local.properties

  # #262 (CI speed): ktlint runs in its OWN job, parallel to build-and-test. ktlint is a standalone
  # SHA-pinned binary linting source files — it needs NO JDK / Android SDK / Gradle setup and does NOT
  # compile, so a formatting nit fails in ~30s instead of waiting on the ~6-min build. (detekt stays in
  # build-and-test: it's a Gradle task needing type resolution, so splitting it would duplicate compilation.)
  ktlint:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: needs.changes.outputs.code == 'true'
      - name: ktlint (formatting gate)
        if: needs.changes.outputs.code == 'true'
        run: |
          KTLINT_VERSION="1.8.0"
          KTLINT_SHA256="a3fd620207d5c40da6ca789b95e7f823c54e854b7fade7f613e91096a3706d75"
          mkdir -p .ktlint
          curl -sSfL "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint" -o .ktlint/ktlint
          echo "$KTLINT_SHA256  .ktlint/ktlint" | shasum -a 256 -c -
          chmod +x .ktlint/ktlint
          ./lint-kotlin.sh
      - name: Docs-only — ktlint skipped
        if: needs.changes.outputs.code != 'true'
        run: echo "Docs-only change — ktlint skipped."
