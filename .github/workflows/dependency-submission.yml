# Plan 32 / ADR-0018 — submits the resolved Gradle dependency graph so GitHub security
# alerts (Dependabot alerts) can see transitive dependencies. Runs on main only.
#
# Scoped to the RELEASE runtime classpath (see env on the submission step): without a
# filter the action submits the ENTIRE Gradle graph including the buildscript/plugin
# classpath, which drags in the Google-API-client stack behind the Play Publisher plugin +
# AGP/bundletool (netty, protobuf-java, bouncycastle, jose4j, jdom2, httpclient,
# commons-lang3). None of those ship in the AAB — they run only on the build machine — yet
# they generated ~28 build-only Dependabot alerts attributed to settings.gradle.kts.
# Scoping to releaseRuntimeClasspath makes the security graph reflect exactly what ships to
# production. (A broader .*RuntimeClasspath scope also surfaced test-only deps such as
# bcprov via Robolectric in debugUnitTestRuntimeClasspath — high severity but never shipped;
# release-only drops that noise too.) Verified 2026-06-10 against :app releaseRuntimeClasspath.
name: Dependency Submission

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  dependency-submission:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: gradle/actions/dependency-submission@5e2ebd065dc2488b7a6ad670704656cbbe1e8f60 # v6.1.1
        env:
          # Java regex matched against configuration names. Anchored to the production AAB
          # runtime config only; excludes the buildscript `classpath` config (build-tool
          # plugin transitives) and the debug/test runtime classpaths (e.g. Robolectric ->
          # bcprov). See the header comment for rationale.
          DEPENDENCY_GRAPH_INCLUDE_CONFIGURATIONS: "^releaseRuntimeClasspath$"
