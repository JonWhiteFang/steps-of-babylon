# Plan 32 / ADR-0018 — instrumented suite (:app connectedDebugAndroidTest, 9 tests).
# Blocking on PRs to main (decision #2) + nightly canary + manual dispatch.
# minSdk 34 => emulator floor is API 34. AVD snapshot is cached to keep runs ~8-12 min.
# Scoped to :app (#26): the :baselineprofile / :macrobenchmark `com.android.test` modules run
# locally on a benchmark variant only — their connected tests refuse a debuggable build
# (EMULATOR DEBUGGABLE) and must NOT run in this debug-app lane.
#
# Docs/tooling-only fast path: the `changes` job classifies the diff; `connected` ALWAYS runs (so
# the required status check always reports), but its heavy emulator steps are gated on
# `needs.changes.outputs.code == 'true'`. A docs/tooling-only PR (only `docs/**`, `*.md`,
# `.claude/**`, or the root `.mcp.json`) skips the emulator entirely (green in seconds). The nightly
# schedule + manual dispatch have no PR base, so the classifier defaults to code=true (full canary
# always runs). Keep the classifier in sync with ci.yml.
name: Instrumented Tests

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: instrumented-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Fast classifier: outputs code=true unless EVERY changed path is docs/tooling
  # (`docs/**`, `*.md`, `.claude/**`, or the root `.mcp.json`).
  changes:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT" = "pull_request" ]; then
            files="$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")"
            echo "Changed files:"; echo "$files"
            # Non-code = anything NOT docs/tooling. Docs/tooling = under docs/, a .md file, under
            # .claude/ (agents/skills/hooks/settings — never built or shipped), or the root .mcp.json.
            # Conservative: anything else (incl. .github/, app/schemas/, gradle, site/ non-md) is code.
            non_docs="$(printf '%s\n' "$files" | grep -vE '^$' | grep -vE '^docs/|\.md$|^\.claude/|^\.mcp\.json$' || true)"
            if [ -z "$non_docs" ]; then
              echo "code=false" >> "$GITHUB_OUTPUT"
              echo "Verdict: docs/tooling-only → skipping the emulator suite."
            else
              echo "code=true" >> "$GITHUB_OUTPUT"
              echo "Verdict: code change → full instrumented gate (first non-docs path: $(printf '%s' "$non_docs" | head -1))."
            fi
          else
            # schedule / workflow_dispatch → no PR base; always run the canary.
            echo "code=true" >> "$GITHUB_OUTPUT"
            echo "Event=$EVENT → full instrumented run."
          fi

  connected:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        if: needs.changes.outputs.code == 'true'
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        if: needs.changes.outputs.code == 'true'
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        if: needs.changes.outputs.code == 'true'
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
        if: needs.changes.outputs.code == 'true'

      # Hardware acceleration — without KVM the emulator boot is prohibitively slow.
      - name: Enable KVM
        if: needs.changes.outputs.code == 'true'
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        if: needs.changes.outputs.code == 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api34-googleapis-x86_64

      - name: Create AVD snapshot
        if: needs.changes.outputs.code == 'true' && steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot-load
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run instrumented tests
        if: needs.changes.outputs.code == 'true'
        uses: reactivecircus/android-emulator-runner@a421e43855164a8197daf9d8d40fe71c6996bb0d # v2.38.0
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot-save
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest

      - name: Upload androidTest results
        if: always() && needs.changes.outputs.code == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: androidTest-results
          path: '**/build/outputs/androidTest-results/**'
          if-no-files-found: ignore
          retention-days: 7

      - name: Docs-only — instrumented suite skipped
        if: needs.changes.outputs.code != 'true'
        run: echo "Docs-only change — emulator suite skipped; required check satisfied."
