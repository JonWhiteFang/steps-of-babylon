# Plan 32 / ADR-0018 — release lane. A `v*` tag builds a signed AAB and uploads it to
# the Play *internal* track (decision #3). Signing material + Play credentials come from
# the `release` environment's secrets. CI builds the COMMITTED versionCode (no auto-bump —
# Play rejects reused codes; see the v13 rejection). One-time manual prerequisites: app
# created in Play Console + first AAB uploaded by hand + service account with track access.
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# #262 L74: serialize overlapping `v*` tag pushes so two releases can't race the Play upload.
# cancel-in-progress:false — a release upload must NEVER be interrupted mid-flight; queue instead.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0 # need the annotated tag object to read its message for release notes
      # #212 (CICD-1): the signing/publishing lane validates the wrapper jar too — this lane builds
      # and signs the production AAB, so it's the most security-sensitive Gradle invocation.
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0
      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      # #262 L68: fail fast if the pushed tag doesn't match the committed versionName, so a tag on the
      # wrong commit can't ship a mislabeled AAB. CI builds the COMMITTED versionCode/versionName (no
      # auto-bump); the tag is the human's assertion of which version this is. Skipped on manual dispatch
      # (no tag). versionName is the comparand (versionCode is not encoded in the tag).
      - name: Tag ↔ versionName consistency guard
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          vn="$(grep -oE 'versionName = "[^"]+"' app/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "tag=$GITHUB_REF_NAME (→ $tag) · committed versionName=$vn"
          if [ "$tag" != "$vn" ]; then
            echo "::error::Tag $GITHUB_REF_NAME ($tag) != committed versionName ($vn) in app/build.gradle.kts." \
              "Re-tag the correct commit or bump versionName before tagging."
            exit 1
          fi

      # #379 (releaseops-1): fail fast if the committed versionCode wasn't bumped past the previous
      # release. Play REJECTS a reused versionCode (the documented v13 rejection), but that failure only
      # surfaces at the very end — after a full signed build + Play upload. This asserts the bump up front.
      # Play remains the backstop; this is a convenience fail-fast, not a safety gate. Skipped on manual
      # dispatch (no tag). Topology-independent tag lookup (`git tag -l ... --sort=-v:refname`, not
      # `git describe "${REF}^"` which follows only the first parent and aborts under pipefail when no prior
      # tag exists). fetch-depth:0 (above) guarantees all tags are present. Assumes tags are pushed in
      # increasing version order (true for all releases to date).
      - name: versionCode collision guard
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          # Current committed versionCode — guarded parse, LOUD on failure (never a silent pipefail abort).
          cur=$(grep -oE 'versionCode = [0-9]+' app/build.gradle.kts | grep -oE '[0-9]+' | head -1 || true)
          if [ -z "$cur" ] || ! [[ "$cur" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not parse a numeric versionCode from app/build.gradle.kts."
            exit 1
          fi
          # Previous release tag = highest-versioned v* tag that is NOT the current one. `|| true` so a
          # missing predecessor (first-ever release) is an empty string, not a pipefail abort.
          prev_tag=$(git tag -l 'v*' --sort=-v:refname | grep -vxF "${GITHUB_REF_NAME}" | head -1 || true)
          if [ -z "$prev_tag" ]; then
            echo "No prior v* tag — first release, skipping versionCode-collision guard."
            exit 0
          fi
          # Previous tag's committed versionCode — same guarded/loud parse.
          prev=$(git show "${prev_tag}:app/build.gradle.kts" | grep -oE 'versionCode = [0-9]+' | grep -oE '[0-9]+' | head -1 || true)
          if [ -z "$prev" ] || ! [[ "$prev" =~ ^[0-9]+$ ]]; then
            echo "::error::Could not parse versionCode from ${prev_tag}:app/build.gradle.kts."
            exit 1
          fi
          echo "current versionCode=$cur · previous ($prev_tag) versionCode=$prev"
          if [ "$cur" -gt "$prev" ]; then
            echo "versionCode bumped ($prev → $cur) — OK."
          else
            echo "::error::versionCode $cur is not greater than the previous release ${prev_tag} ($prev)." \
              "Bump versionCode in app/build.gradle.kts before tagging (Play rejects a reused code)."
            exit 1
          fi

      # Never ship a signed build that fails unit tests.
      - name: Unit test guard
        run: ./gradlew testDebugUnitTest

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.UPLOAD_KEYSTORE_BASE64 }}
        run: |
          mkdir -p release
          echo "$KEYSTORE_BASE64" | base64 -d > release/upload-keystore.jks

      - name: Write keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=release/upload-keystore.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # Production AdMob IDs (else the release build falls back to Google TEST ad units).
      # Each line is written only when its secret is set, so an empty secret can't blank
      # the key (build.gradle reads "" as present, not absent).
      - name: Write AdMob production IDs
        env:
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_POST_ROUND_GEM: ${{ secrets.ADMOB_AD_UNIT_POST_ROUND_GEM }}
          ADMOB_POST_ROUND_DOUBLE_PS: ${{ secrets.ADMOB_AD_UNIT_POST_ROUND_DOUBLE_PS }}
          ADMOB_DAILY_FREE_CARD_PACK: ${{ secrets.ADMOB_AD_UNIT_DAILY_FREE_CARD_PACK }}
        run: |
          if [ -n "$ADMOB_APP_ID" ]; then echo "admob.appId=$ADMOB_APP_ID" >> local.properties; fi
          if [ -n "$ADMOB_POST_ROUND_GEM" ]; then echo "admob.adUnit.postRoundGem=$ADMOB_POST_ROUND_GEM" >> local.properties; fi
          if [ -n "$ADMOB_POST_ROUND_DOUBLE_PS" ]; then echo "admob.adUnit.postRoundDoublePs=$ADMOB_POST_ROUND_DOUBLE_PS" >> local.properties; fi
          if [ -n "$ADMOB_DAILY_FREE_CARD_PACK" ]; then echo "admob.adUnit.dailyFreeCardPack=$ADMOB_DAILY_FREE_CARD_PACK" >> local.properties; fi

      # Play "Licensing" RSA public key (Base64) for #124 client-side purchase-signature
      # verification. UNLIKE the AdMob fallback (which degrades to harmless test IDs), a missing
      # license key would make verification fail-OPEN, so the release build is hard-failed by a
      # Gradle guard (app/build.gradle.kts) when this is blank — there is no silent fallback.
      - name: Write Play license key
        env:
          PLAY_LICENSE_KEY: ${{ secrets.PLAY_LICENSE_KEY }}
        run: |
          if [ -z "$PLAY_LICENSE_KEY" ]; then
            echo "::error::PLAY_LICENSE_KEY secret is empty. #124 purchase-signature verification" \
              "would ship fail-open. Set the PLAY_LICENSE_KEY secret in the 'release' environment" \
              "(Play Console → Monetisation setup → Licensing public key)."
            exit 1
          fi
          echo "play.licenseKey=$PLAY_LICENSE_KEY" >> local.properties

      - name: Build release bundle
        run: ./gradlew bundleRelease

      # #262 L73: jarsigner -verify alone proves only INTEGRITY (the AAB is signed + intact), not
      # WHICH key signed it. Additionally assert the AAB's signer cert SHA-256 matches the upload
      # keystore's cert — catching a wrong/substituted signing key before it reaches Play. (Play App
      # Signing re-signs server-side, so this guards the *upload* identity.) Uses the existing keystore
      # + alias/storepass secrets; no new secret.
      - name: Verify signature + assert signing identity
        env:
          STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
        run: |
          set -euo pipefail
          AAB=app/build/outputs/bundle/release/app-release.aab
          jarsigner -verify "$AAB"
          norm() { grep -m1 'SHA256:' | sed -E 's/.*SHA256:[[:space:]]*//; s/[: ]//g' | tr 'a-f' 'A-F'; }
          expected="$(keytool -list -v -keystore release/upload-keystore.jks -alias "$KEY_ALIAS" \
            -storepass "$STORE_PASSWORD" | norm)"
          actual="$(keytool -printcert -jarfile "$AAB" | norm)"
          echo "upload-key SHA256=$expected"
          echo "aab-signer SHA256=$actual"
          if [ -z "$expected" ] || [ "$expected" != "$actual" ]; then
            echo "::error::AAB signer cert ($actual) does not match the upload keystore ($expected)." \
              "Refusing to publish an AAB signed by an unexpected key."
            exit 1
          fi

      # Play "What's new" comes from the annotated tag message (capped at Play's 500-char
      # limit). Falls back to a generic line for lightweight tags / manual dispatch runs.
      - name: Prepare Play release notes
        run: |
          mkdir -p distribution/whatsnew
          NOTES="$(git tag -l --format='%(contents)' "$GITHUB_REF_NAME")"
          if [ -z "$(printf '%s' "$NOTES" | tr -d '[:space:]')" ]; then
            NOTES="Bug fixes and improvements."
          fi
          printf '%s' "$NOTES" | head -c 500 > distribution/whatsnew/whatsnew-en-US
          echo "----- whatsnew-en-US -----"; cat distribution/whatsnew/whatsnew-en-US

      - name: Upload to Play internal track
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.whitefang.stepsofbabylon
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          tracks: internal
          status: completed
          mappingFile: app/build/outputs/mapping/release/mapping.txt
          whatsNewDirectory: distribution/whatsnew

      - name: GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: app/build/outputs/bundle/release/app-release.aab
          generate_release_notes: true

      # #262 L39: explicitly remove the materialized signing/credential files. Hosted runners are
      # ephemeral (so residual risk is low), but explicit cleanup is best practice and defends against
      # a future artifact-upload step accidentally capturing them. if:always() — runs even on failure.
      - name: Clean up secret files
        if: always()
        run: |
          rm -f release/upload-keystore.jks keystore.properties local.properties
