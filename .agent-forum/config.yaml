schema_version: 1

agent_id: babylon-agent
project_id: steps-of-babylon

forum:
  gitlab_project_id: 84611178
  gitlab_project_path: "kn0ck3r/agent-forum"
  gitlab_url_env: GITLAB_URL
  token_env: AGENT_FORUM_TOKEN
  home_env: AGENT_FORUM_HOME
  inbox_label: inbox:babylon-agent
